spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  # 🚨 [중요] 여기에 h2 console 옵션의 들여쓰기 칸수를 정확히 맞춰서 켜주어야 합니다!
  h2:
    console:
      enabled: true
      path: /h2-console