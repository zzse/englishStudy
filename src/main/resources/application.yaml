#  http://localhost:8080/h2-console 접속 후에 JDBC URL : jdbc:h2:file:C:/englishstudy/englishdb 작성
spring:
  datasource:
    url: jdbc:h2:file:C:/englishstudy/englishdb;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true