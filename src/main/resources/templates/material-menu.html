<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>복습 모드 선택</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            /* 따뜻한 아이보리 배경 */
            background-color: #FFF4E6;
            overflow-x: hidden;
        }

        .font-jua {
            font-family: 'Jua', sans-serif;
        }

        /* 뱃지 스타일 (뒤로가기, 안내문구용) */
        .brutal-badge {
            border: 2px solid #1f2937;
            box-shadow: 3px 4px 0px #1f2937;
            transition: all 0.1s ease;
        }
        .brutal-badge:active {
            box-shadow: 0px 0px 0px #1f2937;
            transform: translate(3px, 4px);
        }

        /* 🌟 거대한 스티커 카드 스타일 */
        .brutal-card {
            border: 4px solid #1f2937;
            box-shadow: 6px 8px 0px #1f2937;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .brutal-card:hover {
            transform: translate(-4px, -4px) rotate(-1deg);
            box-shadow: 10px 12px 0px #1f2937;
        }

        .brutal-card:active {
            box-shadow: 0px 0px 0px #1f2937;
            transform: translate(6px, 8px);
            transition: all 0.1s;
        }

        /* 삐뚤빼뚤 컷아웃 테두리 세트 */
        .shape-1 { border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px; }
        .shape-2 { border-radius: 1.5rem; } /* 깔끔한 둥근 모양 */
        .shape-3 { border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px; }

        /* 타이틀 텍스트 테두리 효과 */
        .title-outline {
            -webkit-text-stroke: 1.5px #1f2937;
            color: #9D84FF; /* 퍼플 베이스 */
        }

        /* 카드 내부 텍스트 테두리 */
        .card-title-outline {
            -webkit-text-stroke: 1px #1f2937;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

<div class="max-w-4xl w-full text-center">

    <div class="text-left mb-8">
        <a href="/" class="inline-block bg-white text-gray-800 font-jua text-sm sm:text-base px-5 py-2.5 rounded-xl brutal-badge hover:bg-gray-50">
            ⬅️ 대시보드로 돌아가기
        </a>
    </div>

    <div class="mb-12">
        <h1 class="text-4xl sm:text-5xl font-jua title-outline mb-4 drop-shadow-md" th:text="${material.title}">교재 제목</h1>
        <p class="text-gray-800 font-bold text-sm sm:text-base bg-white inline-block px-5 py-2 rounded-xl brutal-badge bg-[#FFD166]">
            어떤 모드로 복습할까요? 🤔
        </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 sm:gap-8">

        <a th:href="@{'/review/material/' + ${material.id} + '/word'}" class="brutal-card shape-1 bg-[#FF85A2] p-8 flex flex-col items-center group block">
            <div class="text-5xl mb-4 group-hover:scale-125 group-hover:rotate-6 transition-transform drop-shadow-md">🎯</div>
            <h2 class="text-3xl font-jua card-title-outline mb-2 tracking-wide">단어 테스트</h2>
        </a>

        <a th:href="@{'/review/material/' + ${material.id} + '/sentence'}" class="brutal-card shape-2 bg-[#4DB8FF] p-8 flex flex-col items-center group block">
            <div class="text-5xl mb-4 group-hover:scale-125 group-hover:-rotate-6 transition-transform drop-shadow-md">📰</div>
            <h2 class="text-3xl font-jua card-title-outline mb-2 tracking-wide">문장 통영작</h2>
        </a>

        <a th:href="@{'/review/material/' + ${material.id} + '/dialogue'}" class="brutal-card shape-3 bg-[#47D1A0] p-8 flex flex-col items-center group block">
            <div class="text-5xl mb-4 group-hover:scale-125 group-hover:rotate-12 transition-transform drop-shadow-md">💬</div>
            <h2 class="text-3xl font-jua card-title-outline mb-2 tracking-wide">회화 롤플레잉</h2>
        </a>

    </div>
</div>

</body>
</html>
