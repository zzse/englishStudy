<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>복습 모드 선택</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

<div class="max-w-4xl w-full text-center">
    <div class="text-left mb-6">
        <a href="/" class="text-sm font-semibold text-blue-600 hover:text-blue-800">⬅️ 전체 교재 목록으로</a>
    </div>

    <h1 class="text-3xl font-black text-gray-900 mb-2" th:text="${material.title}"></h1>
    <p class="text-gray-500 mb-12">원하는 복습 모드를 선택하세요.</p>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <a th:href="@{'/review/material/' + ${material.id} + '/word'}" class="bg-white p-8 rounded-2xl shadow-md border border-gray-100 hover:shadow-xl hover:-translate-y-2 transition-all block group">
            <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🎯</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">단어 테스트</h2>
            <p class="text-sm text-gray-500">핵심 단어를 무작위 카드로 맞춰보며 학습합니다.</p>
        </a>

        <a th:href="@{'/review/material/' + ${material.id} + '/sentence'}" class="bg-white p-8 rounded-2xl shadow-md border border-gray-100 hover:shadow-xl hover:-translate-y-2 transition-all block group">
            <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">📰</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">문장 통영작</h2>
            <p class="text-sm text-gray-500">시사 본문 핵심 정교한 문장 전체를 직접 작성합니다.</p>
        </a>

        <a th:href="@{'/review/material/' + ${material.id} + '/dialogue'}" class="bg-white p-8 rounded-2xl shadow-md border border-gray-100 hover:shadow-xl hover:-translate-y-2 transition-all block group">
            <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">💬</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">회화 롤플레잉</h2>
            <p class="text-sm text-gray-500">상대방 대사(A)를 보고 내 대사(B)를 완성해 봅니다.</p>
        </a>
    </div>
</div>

</body>
</html>
