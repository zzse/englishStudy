<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - English Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-6">

<div class="max-w-md w-full bg-white p-6 sm:p-8 rounded-2xl border shadow-sm">
    <h1 class="text-2xl sm:text-3xl font-black text-center text-gray-900 mb-1">🚀 English Study</h1>
    <p class="text-center text-xs text-gray-400 mb-6 sm:mb-8">스터디 복습룸에 로그인하세요.</p>

    <div class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">닉네임</label>
            <input type="text" id="nickname" placeholder="닉네임을 입력하세요" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" class="w-full px-4 py-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 pt-2">
            <label class="flex items-center gap-2 text-xs text-gray-600 font-medium cursor-pointer">
                <input type="checkbox" id="rememberMe" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500 w-4 h-4">
                한 달간 자동 로그인 유지 🔑
            </label>
            <a href="/register" class="text-xs text-blue-600 hover:underline font-semibold self-start sm:self-auto">처음이신가요? 회원가입 ➡️</a>
        </div>

        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-6 text-sm sm:text-base">
            복습룸 입장하기 ⚡
        </button>
    </div>
</div>

<script>
    function handleLogin() {
        const nickname = document.getElementById('nickname').value.trim();
        const password = document.getElementById('password').value.trim();
        const rememberMe = document.getElementById('rememberMe').checked;

        if(!nickname || !password) { alert("모든 칸을 입력해 주세요."); return; }

        const params = new URLSearchParams();
        params.append('nickname', nickname);
        params.append('password', password);
        params.append('rememberMe', rememberMe);

        fetch('/api/auth/login', { method: 'POST', body: params })
            .then(res => res.text())
            .then(status => {
                if (status === 'SUCCESS') {
                    location.href = '/';
                } else {
                    alert("❌ 닉네임 또는 비밀번호가 틀렸습니다. 다시 확인해 주세요.");
                }
            });
    }
</script>
</body>
</html>
