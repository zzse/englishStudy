<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - English Study</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 🌟 배달의민족 주아체 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            /* 따뜻한 아이보리 배경 */
            background-color: #FFF4E6;
        }

        .font-jua {
            font-family: 'Jua', sans-serif;
        }

        /* 글씨 외곽선 (하얀 글씨 + 검은 테두리) */
        .text-outline {
            color: white;
            -webkit-text-stroke: 2px #1f2937;
            paint-order: stroke fill;
        }

        /* 삐뚤빼뚤한 종이 오리기 효과 */
        .cutout-box {
            border: 3px solid #1f2937;
            border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
            box-shadow: 3px 4px 0px #1f2937;
        }

        /* 꽃 모양(톱니바퀴) 효과 */
        .flower-box {
            border: 3px solid #1f2937;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            box-shadow: 3px 4px 0px #1f2937;
        }

        /* 폼 박스 굵은 테두리와 그림자 */
        .brutal-box {
            border: 3px solid #1f2937;
            border-radius: 1.5rem;
            box-shadow: 6px 8px 0px #1f2937;
        }

        /* 입력창 포커스 애니메이션 */
        .brutal-input {
            border: 2px solid #1f2937;
            transition: all 0.2s ease-in-out;
        }
        .brutal-input:focus {
            box-shadow: 3px 3px 0px #1f2937;
            transform: translate(-2px, -2px);
            outline: none;
        }

        /* 버튼 누름 애니메이션 */
        .brutal-btn {
            border: 3px solid #1f2937;
            box-shadow: 4px 5px 0px #1f2937;
            transition: all 0.1s active;
        }
        .brutal-btn:active {
            box-shadow: 0px 0px 0px #1f2937;
            transform: translate(4px, 5px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 overflow-x-hidden">

<!-- 🌟 JOIN 스티커 타이틀 영역 -->
<div class="mb-8 flex flex-col items-center gap-3 font-jua text-5xl sm:text-6xl font-bold cursor-default select-none tracking-wider">
    <div class="flex flex-wrap justify-center gap-2">
        <div class="cutout-box bg-[#9D84FF] px-4 py-2 transform -rotate-6 hover:scale-110 transition-transform"><span class="text-outline">J</span></div>
        <div class="flower-box bg-[#FF85A2] px-5 py-3 transform rotate-3 hover:scale-110 transition-transform"><span class="text-outline">O</span></div>
        <div class="cutout-box bg-[#FFD166] px-4 py-2 transform -rotate-3 hover:scale-110 transition-transform"><span class="text-outline">I</span></div>
        <div class="cutout-box bg-[#47D1A0] px-4 py-2 transform rotate-6 hover:scale-110 transition-transform"><span class="text-outline">N</span></div>
    </div>
</div>

<!-- 📝 회원가입 폼 영역 -->
<div class="max-w-md w-full bg-white p-6 sm:p-8 brutal-box relative z-10">
    <!-- 장식용 이모지 (알에서 깨어나는 병아리) -->
    <div class="absolute -top-5 -left-4 text-4xl transform -rotate-12">🐣</div>

    <p class="text-center text-sm font-bold text-gray-600 mb-6 sm:mb-8 font-jua text-lg">스터디 크루로 합류하세요!</p>

    <div class="space-y-4">
        <div>
            <label class="block text-xs font-black text-gray-800 mb-1.5 tracking-wide">원하는 닉네임 입력</label>
            <input type="text" id="nickname" placeholder="예: 세현, joy, tom" class="w-full px-4 py-3 brutal-input rounded-xl text-sm bg-gray-50">
        </div>
        <div>
            <label class="block text-xs font-black text-gray-800 mb-1.5 tracking-wide">비밀번호 설정</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" class="w-full px-4 py-3 brutal-input rounded-xl text-sm bg-gray-50" onkeyup="if(window.event.keyCode==13){handleRegister()}">
        </div>

        <button onclick="handleRegister()" class="w-full bg-[#9D84FF] text-white font-jua text-xl py-3.5 rounded-xl mt-6 brutal-btn tracking-widest relative overflow-hidden group">
            <span class="text-outline relative z-10">가입 완료하기 🚀</span>
        </button>

        <div class="text-center mt-4 pt-2">
            <a href="/login" class="text-sm text-[#FF8C42] hover:text-[#e6732d] font-black transition-colors">
                ⬅️ 이미 계정이 있으신가요?
            </a>
        </div>
    </div>
</div>

<script>
    function handleRegister() {
        const nickname = document.getElementById('nickname').value.trim();
        const password = document.getElementById('password').value.trim();

        if(!nickname || !password) {
            alert("닉네임과 비밀번호를 모두 입력해 주세요! 📝");
            return;
        }

        const params = new URLSearchParams();
        params.append('nickname', nickname);
        params.append('password', password);

        fetch('/api/auth/register', { method: 'POST', body: params })
            .then(res => res.text())
            .then(status => {
                if (status === 'SUCCESS') {
                    alert("🎉 회원가입이 성공적으로 완료되었습니다! 로그인해 주세요.");
                    location.href = '/login';
                } else if (status === 'DUPLICATE_NICKNAME') {
                    alert("❌ 이미 존재하는 닉네임입니다. 다른 닉네임을 입력해 주세요.");
                } else {
                    alert("가입 중 오류가 발생했습니다. 🔌");
                }
            });
    }
</script>
</body>
</html>
