<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>영어 스터디 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-8">

<div class="max-w-4xl mx-auto">
    <header class="mb-10 text-center">
        <h1 class="text-4xl font-black text-gray-900 mb-2">🚀 My English Study Room</h1>
        <p class="text-gray-500">날짜별 교재를 선택하고 완벽히 복습하세요.</p>
    </header>

    <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm mb-12">
        <h2 class="text-xl font-bold text-gray-800 mb-2 flex items-center gap-2">
            <span>📤</span> 스마트 PDF 교재 등록
        </h2>
        <p class="text-xs text-gray-400 mb-4">파일명이 '20260615 타이틀.pdf' 형태인 파일을 올리면 날짜와 제목이 DB에 자동 분석되어 즉시 등록됩니다.</p>

        <form action="/api/material/upload-pdf" method="POST" enctype="multipart/form-data" class="flex flex-col sm:flex-row gap-4 items-center">
            <div class="flex-1 w-full">
                <input type="file" name="pdfFile" accept=".pdf" required
                       class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer border border-dashed border-gray-300 p-2 rounded-2xl">
            </div>
            <div class="w-full sm:w-auto">
                <button type="submit" class="w-full bg-gray-900 hover:bg-black text-white text-sm font-bold py-3 px-6 rounded-xl transition-all shadow-sm whitespace-nowrap">
                    분석 및 바로 저장 ⚡
                </button>
            </div>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="md:col-span-2 space-y-4">
            <h2 class="text-xl font-bold text-gray-800 mb-2">📅 날짜별 스터디 교재 리스트</h2>

            <div th:each="mat : ${materials}" class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm flex justify-between items-center hover:border-blue-500 transition-all gap-4 min-h-[105px]">

                <div class="flex-1 min-w-0">
                    <span th:text="${mat.studyDate}" class="text-xs font-semibold text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md inline-block"></span>

                    <h3 th:text="${mat.title}" th:title="${mat.title}" class="text-lg font-bold text-gray-800 mt-2.5 truncate"></h3>
                </div>

                <div class="flex-shrink-0">
                    <a th:href="@{'/review/material/' + ${mat.id}}" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-3 rounded-xl transition-all shadow-sm whitespace-nowrap block text-center">
                        퀴즈 시작 ✏️
                    </a>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(materials)}" class="text-center py-12 text-gray-400 font-medium bg-white rounded-xl border border-dashed">
                등록된 스터디 교재가 없습니다. 위의 시스템에서 PDF를 등록해 주세요! 📂
            </div>
        </div>

        <div class="bg-gradient-to-br from-red-50 to-orange-50 p-6 rounded-2xl border border-red-100 flex flex-col justify-between shadow-sm h-fit">
            <div>
                <h2 class="text-xl font-bold text-red-800">🚨 전체 복습 창고</h2>
                <p class="text-xs text-red-600 mt-1">지금까지 틀렸던 모든 표현들이 누적 보관됩니다.</p>

                <div class="my-6">
                    <span class="text-5xl font-black text-red-600" th:text="${totalWrongCount}">0</span>
                    <span class="text-gray-600 font-medium ml-1">개의 문장</span>
                </div>
            </div>

            <a href="/review/all-wrong" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-center py-3 rounded-xl transition-all block">
                전체 오답 마스터하기 ➡️
            </a>
        </div>
    </div>
</div>

</body>
</html>
